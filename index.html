          const rec = new SpeechRecognition();
          rec.continuous = false;
          rec.lang = 'es-ES';
          rec.interimResults = false;

          rec.onstart = () => setIsListening(true);
          rec.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            setInputText(prev => prev ? prev + " " + transcript : transcript);
          };
          rec.onerror = (event) => {
            console.error("Error reconociendo voz:", event.error);
            setIsListening(false);
            if (event.error !== 'no-speech') {
              setErrorNotificacion("Permiso de micrófono denegado o no disponible.");
            }
          };
          rec.onend = () => setIsListening(false);
          recognitionRef.current = rec;
        }
      }, []);

      const toggleListening = () => {
        if (!recognitionRef.current) {
          setErrorNotificacion("El reconocimiento de voz no está soportado en este navegador.");
          return;
        }
        if (isListening) {
          recognitionRef.current.stop();
        } else {
          setErrorNotificacion("");
          try {
            recognitionRef.current.start();
          } catch (e) {
            console.error("Error al iniciar micrófono:", e);
          }
        }

        if (!elementos || elementos.length === 0) return [];
        const grupos = {};

            if (!grupos[el.tipo]) grupos[el.tipo] = [];
            grupos[el.tipo].push(el);
          }
        });
        const candidatos = Object.keys(grupos).map(tipo => {
          const lista = grupos[tipo];
          return lista[Math.floor(Math.random() * lista.length)];
        });
        const cant = Math.floor(Math.random() * (cantidadMaxima + 1)); 
        return candidatos.sort(() => 0.5 - Math.random()).slice(0, cant);

        const firstBracket = str.indexOf('{');
        const lastBracket = str.lastIndexOf('}');

      const generateOfflineResponse = (userText, clientProfile, currentDefensiva) => {

          intent = "cierre_contrato";

          intent = "uso_internet";

            defChange = -5;
            phase = "sondeo_emocional";
            break;
          case "consulta_cuantitativa":
            phase = "sondeo_cuantitativo";

              defChange = 25;

              reply = "Eso son asuntos privados míos. No me gusta hablar de lo que pago con desconocidos.";

              defChange = -10;

          case "consulta_emocional":
            phase = "sondeo_emocional";
            if (turnCount < 2) {

              reply = `Pues la verdad es que me da bastante rabia porque a veces ${clientProfile.dolorOculto.toLowerCase()}`;
              emo = true;

              }
            } else if (currentDefensiva < 45 && emocional && cuantitativo) {
              reply = `De acuerdo, me parece razonable lo que me explica. Si usted se compromete a que todo sea limpio, vamos a tramitarlo.`;

      const callGeminiWithRetry = async (payload, retries = 3, delay = 1000) => {
        const apiKey = ""; 
        const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
        for (let i = 0; i < retries; i++) {
          try {
            const response = await fetch(url, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(payload)
            });
            if (response.ok) return await response.json();
          } catch (err) {}
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
        throw new Error("Servidor no disponible.");
      };

              doc.setFontSize(9);
              const splitEval = doc.splitTextToSize(faseItem.evaluacion, 180);
              doc.text(splitEval, 14, posY);
              posY += (splitEval.length * 4.5) + 3;

              if (faseItem.aciertos && faseItem.aciertos.length > 0) {
                doc.setFont("helvetica", "bold");
                doc.setTextColor(16, 124, 65);
                doc.text("Aciertos:", 14, posY);
                posY += 4.5;
                doc.setFont("helvetica", "normal");
                faseItem.aciertos.forEach((ac) => {
                  doc.text(`- ${ac}`, 18, posY);
                  posY += 4.5;
                });
                posY += 1.5;
              }

              if (faseItem.fallos && faseItem.fallos.length > 0) {
                doc.setFont("helvetica", "bold");
                doc.setTextColor(168, 44, 44);
                doc.text("Aspectos a mejorar:", 14, posY);
                posY += 4.5;
                doc.setFont("helvetica", "normal");
                faseItem.fallos.forEach((fa) => {
                  doc.text(`- ${fa}`, 18, posY);
                  posY += 4.5;
                });
                posY += 2;
              }

              doc.setTextColor(...colorGrisOscuro);
              posY += 8;
            });
          }

          const sanitizedNombre = nombreAsesor.replace(/[^a-z0-9]/gi, '_').toLowerCase();
          doc.save(`Auditoria_D2D_${sanitizedNombre}.pdf`);
          setErrorNotificacion("");
        } catch (err) {
          console.error("Fallo al compilar reporte PDF:", err);
          setErrorNotificacion("Error al generar el PDF de la auditoría.");
        }
      };

      const enviarPorEmailAWalter = () => {
        setEnviandoEmail(true);
        setEnvioLogs(["Iniciando compilación de la auditoría...", "Generando documento PDF de rendimiento..."]);

        setTimeout(() => setEnvioLogs(prev => [...prev, "Analizando transcripción del chat..."]), 1000);
        setTimeout(() => setEnvioLogs(prev => [...prev, "Estableciendo conexión de correo..."]), 2000);
        setTimeout(() => {
          setEnvioLogs(prev => [...prev, "Informe empaquetado y listo para despacho."]);
          setEmailEnviadoConExito(true);
          setEnviandoEmail(false);

          const statusString = resultadoFin === 'win' ? 'ÉXITO CONTRATO' : resultadoFin === 'concertada' ? 'CITA CONCERTADA' : resultadoFin === 'retirada' ? 'RETIRADA ASESOR' : 'RECHAZO/PORTAZO';
          const subject = encodeURIComponent(`[D2D] Informe de Auditoría [${statusString}] - ${nombreAsesor}`);
          const body = encodeURIComponent(
            `Hola Walter,\n\nTe adjunto mi última simulación de ventas D2D.\n\n` +
            `DATOS GENERALES:\n` +
            `Asesor Evaluado: ${nombreAsesor}\n` +
            `Cliente: ${cliente?.nombre} (${cliente?.perfilTitulo})\n` +
            `Nota Obtenida: ${informe ? informe.global.nota : 'N/A'}/10\n` +
            `Resultado: ${statusString}\n\n` +
            `CONSEJO CLAVE:\n` +
            `"${informe ? informe.global.consejo_clave : 'N/A'}"\n\n` +
            `Un saludo,\n${nombreAsesor}`
          );
          
          window.location.href = `mailto:walter.santos@digimobil.es?subject=${subject}&body=${body}`;
        }, 3200);
      };

      return (
        <div className="min-h-screen bg-gray-950 text-gray-100 flex flex-col font-sans">
          
          {/* CABECERA */}
          <header className="bg-gray-900 border-b border-gray-800 px-4 py-4 sm:px-6 shadow-md flex flex-col sm:flex-row justify-between items-center gap-4 shrink-0">
            <div>
              <h1 className="text-base sm:text-xl font-extrabold text-white tracking-wide">
                Entrenador de Ventas D2D
              </h1>
              <p className="text-[10px] sm:text-xs text-gray-400 font-medium">Conversación de viva voz y auditoría realista de fases de venta</p>
            </div>
            {nombreAsesor && (
              <div className="flex flex-wrap items-center gap-3 w-full sm:w-auto justify-end">
                <span className="text-xs text-gray-400 font-semibold">
                  Asesor: <span className="text-blue-400 font-bold">{nombreAsesor}</span>
                </span>
                <span className={`text-[9px] uppercase font-extrabold px-2 py-1 rounded-lg ${dificultad === 'facil' ? 'bg-emerald-950 text-emerald-400 border border-emerald-800' : dificultad === 'dificil' ? 'bg-red-950 text-red-400 border border-red-800' : 'bg-amber-950 text-amber-400 border border-amber-800'}`}>
                  Dificultad: {dificultad === 'facil' ? 'Fácil 🟢' : dificultad === 'medio' ? 'Medio 🟡' : 'Difícil 🔴'}
                </span>
                <button 
                  onClick={reiniciarPartida}
                  className="w-full sm:w-auto px-5 py-2 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-bold rounded-xl text-xs sm:text-sm shadow-md transition-all duration-200 text-center"
                >
                  🔄 Siguiente Cliente
                </button>
              </div>
            )}
          </header>

          {/* TABS DE MÓVIL */}
          {fase !== 'registro' && (
            <div className="lg:hidden flex border-b border-gray-800 bg-gray-900 shrink-0">
              <button
                onClick={() => setActiveTabMobile('perfil')}
                className={`flex-1 py-3 text-xs font-bold text-center border-b-2 ${activeTabMobile === 'perfil' ? 'border-blue-500 text-white bg-gray-950/40' : 'border-transparent text-gray-400'}`}
              >
                📋 Cliente & Pistas
              </button>
              <button
                onClick={() => setActiveTabMobile('conversacion')}
                className={`flex-1 py-3 text-xs font-bold text-center border-b-2 relative ${activeTabMobile === 'conversacion' ? 'border-blue-500 text-white bg-gray-950/40' : 'border-transparent text-gray-400'}`}
              >
                💬 Terminal de Venta
              </button>
            </div>
          )}

          {/* CONTENIDO PRINCIPAL */}
          <main className="flex-1 max-w-7xl w-full mx-auto p-4 lg:p-6 grid grid-cols-1 lg:grid-cols-12 gap-6 overflow-hidden lg:h-[calc(100vh-140px)]">
            
            {/* PANTALLA DE REGISTRO */}
            {fase === 'registro' ? (
              <section className="col-span-12 flex items-center justify-center my-auto px-4">
                <div className="max-w-md w-full bg-gray-900 border border-gray-800 p-6 sm:p-8 rounded-2xl shadow-xl space-y-6">
                  <div className="text-center space-y-2">
                    <span className="text-5xl">📋</span>
                    <h2 className="text-xl sm:text-2xl font-black text-white">Registro del Asesor</h2>
                    <p className="text-xs text-gray-400">Introduce tu nombre y ajusta el nivel de dificultad para comenzar la simulación.</p>
                  </div>

                  {errorNotificacion && (
                    <div className="bg-red-950/50 border border-red-500/50 text-red-200 text-xs px-3.5 py-2.5 rounded-xl">
                      ⚠️ {errorNotificacion}
                    </div>
                  )}

                  <form onSubmit={procesarRegistroAsesor} className="space-y-4">
                    <div>
                      <label className="text-[10px] uppercase font-bold text-gray-400 block mb-1.5 tracking-wider">Nombre Completo del Asesor:</label>
                      <input
                        type="text"
                        value={inputAsesorTemp}
                        onChange={(e) => setInputAsesorTemp(e.target.value)}
                        placeholder="Ej. Fulanito de Tal"
                        className="w-full bg-gray-950 border border-gray-800 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-blue-500 text-gray-100 placeholder-gray-600 transition-all min-h-[44px]"
                      />
                    </div>

                    <div>
                      <label className="text-[10px] uppercase font-bold text-gray-400 block mb-1.5 tracking-wider">Dificultad del Cliente:</label>
                      <div className="grid grid-cols-3 gap-2">
                        {[
                          { val: 'facil', label: 'Fácil 🟢', desc: 'Sondeo ágil' },
                          { val: 'medio', label: 'Medio 🟡', desc: 'Perfil real' },
                          { val: 'dificil', label: 'Difícil 🔴', desc: 'Hostil/Crítico' }
                        ].map((d) => (
                          <button
                            key={d.val}
                            type="button"
                            onClick={() => setDificultad(d.val)}
                            className={`px-2 py-2.5 rounded-xl border text-xs font-bold transition-all text-center flex flex-col items-center justify-center min-h-[56px] ${dificultad === d.val ? 'bg-blue-600 border-blue-500 text-white shadow-md' : 'bg-gray-950 border-gray-850 text-gray-400 hover:border-gray-700'}`}
                          >
                            <span>{d.label}</span>
                            <span className="text-[8px] font-normal opacity-70 mt-0.5">{d.desc}</span>
                          </button>
                        ))}
                      </div>
                    </div>

                    <button
                      type="submit"
                      className="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-700 hover:to-indigo-700 text-white font-extrabold rounded-xl text-xs uppercase tracking-wider shadow-md transform active:scale-95 transition-all min-h-[44px]"
                    >
                      Iniciar Entrenamiento Comercial 🚀
                    </button>
                  </form>
                </div>
              </section>
            ) : (
              <>
                {/* COLUMNA 1: FICHA DE DIAGNÓSTICO */}
                <section className={`lg:col-span-4 bg-gray-900 border border-gray-800 rounded-2xl p-4 sm:p-5 flex flex-col justify-between shadow-lg space-y-4 lg:h-full lg:overflow-y-auto ${activeTabMobile === 'perfil' ? 'block' : 'hidden lg:flex'}`}>
                  <div>
                    
                    <div className="bg-gray-950 p-4 rounded-xl border border-gray-800 relative overflow-hidden">
                      <span className="absolute top-2 right-2 text-3xl opacity-20">{cuantitativo ? cliente?.avatar : "👤"}</span>
                      <span className="text-[9px] font-extrabold uppercase tracking-wider text-blue-400 bg-blue-950/80 px-2 py-0.5 rounded-md">
                        {cuantitativo ? cliente?.perfilTitulo : "Propietario Anónimo"}
                      </span>
                      <h3 className="text-base sm:text-lg font-bold text-white mt-1.5">
                        {cuantitativo ? `${cliente?.nombre}, ${cliente?.edad} años` : "Propietario de la vivienda"}
                      </h3>
                      
                      <div className="mt-3 text-xs text-gray-400 space-y-1.5 border-t border-gray-850 pt-3">
                        <p>🏠 <span className="font-semibold text-gray-300">Entorno:</span> {vivienda}</p>
                        <p>📡 <span className="font-semibold text-gray-300">Operador actual:</span> {cuantitativo ? cliente?.operadorActual : '???'}</p>
                        <p>💰 <span className="font-semibold text-gray-300">Gasto mensual:</span> {cuantitativo ? `${cliente?.pagoActual}€ / mes` : '???'}</p>
                      </div>
                    </div>

                    <div className="mt-5 space-y-4">
                      <h4 className="text-[10px] sm:text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-gray-800 pb-1.5">Métricas de Venta</h4>
                      
                      <div className="bg-gray-950 p-3 rounded-xl border border-gray-800">
                        <div className="flex justify-between items-center mb-1">
                          <span className="text-xs font-bold text-gray-300">Defensiva del Cliente:</span>
                          <span className={`text-xs font-black ${defensiva >= 80 ? 'text-red-500' : defensiva >= 50 ? 'text-yellow-500' : 'text-green-500'}`}>
                            {defensiva} / 100
                          </span>
                        </div>
                        <div className="w-full bg-gray-800 h-2.5 rounded-full overflow-hidden">
                          <div 
                            className={`h-full transition-all duration-500 rounded-full ${defensiva >= 80 ? 'bg-red-500' : defensiva >= 50 ? 'bg-yellow-500' : 'bg-green-500'}`}
                            style={{ width: `${defensiva}%` }}
                          />
                        </div>
                      </div>

                      <div className="grid grid-cols-2 gap-3">
                        <div className={`p-3 rounded-xl border text-center transition-all duration-300 ${cuantitativo ? 'bg-emerald-950/40 border-emerald-500/50 text-emerald-300' : 'bg-gray-950 border-gray-800 text-gray-500'}`}>
                          <span className="text-[9px] uppercase font-bold tracking-wider block">Sondeo Tarifas</span>
                          <span className="text-xs font-extrabold block mt-1">{cuantitativo ? "✅ CONOCIDAS" : "❌ PENDIENTE"}</span>
                        </div>
                        <div className={`p-3 rounded-xl border text-center transition-all duration-300 ${emocional ? 'bg-emerald-950/40 border-emerald-500/50 text-emerald-300' : 'bg-gray-950 border-gray-800 text-gray-500'}`}>
                          <span className="text-[9px] uppercase font-bold tracking-wider block">Dolor Emocional</span>
                          <span className="text-xs font-extrabold block mt-1">{emocional ? "🎯 DOLOR ACTIVO" : "❌ PENDIENTE"}</span>
                        </div>
                      </div>
                    </div>

                    <div className="mt-5">
                      <h4 className="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2.5 flex justify-between items-center">
                        <span>🔍 Observaciones del entorno</span>
                        <span className="text-[9px] bg-blue-950 border border-blue-800 text-blue-400 px-1.5 py-0.5 rounded">
                          {fase === 'exterior' ? 'Fachada' : 'Pasillo'}
                        </span>
                      </h4>
                      
                      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 gap-2 max-h-48 overflow-y-auto">
                        {fase === 'exterior' ? (
                          pistasExteriores.map((pista) => (
                            <button
                              key={pista.id}
                              onClick={() => descubrirPista(pista)}
                              className={`p-3 lg:p-2.5 rounded-lg border text-left text-xs transition-all flex items-center space-x-2 ${pistasDescubiertas.includes(pista.id) ? 'bg-blue-950/30 border-blue-500 text-blue-300' : 'bg-gray-950 border-gray-800 text-gray-400'}`}
                            >
                              <span className="text-lg shrink-0">{pista.icono}</span>
                              <span className="font-semibold line-clamp-1">{pista.etiqueta}</span>
                            </button>
                          ))
                        ) : (
                          pistasInteriores.map((pista) => (
                            <button
                              key={pista.id}
                              onClick={() => descubrirPista(pista)}
                              className={`p-3 lg:p-2.5 rounded-lg border text-left text-xs transition-all flex items-center space-x-2 ${pistasDescubiertas.includes(pista.id) ? 'bg-blue-950/30 border-blue-500 text-blue-300' : 'bg-gray-950 border-gray-800 text-gray-400'}`}
                            >
                              <span className="text-lg shrink-0">{pista.icono}</span>
                              <span className="font-semibold line-clamp-1">{pista.etiqueta}</span>
                            </button>
                          ))
                        )}
                      </div>

                      {pistaActiva && (
                        <div className="mt-3 bg-blue-950/25 border border-blue-900/55 p-3 rounded-lg text-xs animate-fadeIn">
                          <span className="font-bold text-blue-400 flex items-center gap-1">
                            {pistaActiva.icono} {pistaActiva.etiqueta}
                          </span>
                          <p className="text-gray-300 mt-1 text-[11px] leading-relaxed">{pistaActiva.descripcion}</p>
                        </div>
                      )}
                    </div>
                  </div>
                </section>

                {/* COLUMNA 2: CONVERSACIÓN */}
                <section className={`lg:col-span-8 bg-gray-900 border border-gray-800 rounded-2xl flex flex-col justify-between overflow-hidden shadow-lg h-[500px] sm:h-[600px] lg:h-full ${activeTabMobile === 'conversacion' ? 'block' : 'hidden lg:flex'}`}>
                  
                  <div className="bg-gray-950 p-4 border-b border-gray-800 flex justify-between items-center shrink-0">
                    <div className="flex items-center space-x-2">
                      <span className={`h-2.5 w-2.5 rounded-full ${fase === 'conversacion' ? 'bg-green-500 animate-pulse' : 'bg-yellow-500'}`}></span>
                      <span className="text-xs font-bold text-gray-300">Terminal Conversacional D2D</span>
                    </div>
                    <span className="text-[9px] bg-blue-900/30 text-blue-400 border border-blue-800 px-2 py-0.5 rounded-full font-bold uppercase shrink-0">
                      {fase === 'exterior' ? 'Llamada pendiente 🔒' : 'Puerta Abierta 🔓'}
                    </span>
                  </div>

                  {fase === 'conversacion' && (
                    <div className="bg-gray-900 border-b border-gray-800 px-4 py-3 shrink-0">
                      <div className="grid grid-cols-4 gap-1.5 sm:gap-3">
                        {Object.entries(FASES_VENTA_INFO).map(([key, info]) => {
                          const activo = faseVentaActual === key;
                          const indexActual = Object.keys(FASES_VENTA_INFO).indexOf(faseVentaActual);
                          const completado = Object.keys(FASES_VENTA_INFO).indexOf(key) < indexActual;
                          return (
                            <div key={key} className="flex flex-col items-center text-center">
                              <div className={`w-full h-1.5 rounded-full transition-all duration-500 ${activo ? 'bg-blue-500 shadow-md shadow-blue-500/40' : completado ? 'bg-emerald-500' : 'bg-gray-800'}`} />
                              <span className={`text-[8px] sm:text-[10px] font-bold mt-2 ${activo ? 'text-blue-400 font-black' : completado ? 'text-emerald-400' : 'text-gray-500'}`}>
                                {info.label}
                              </span>
                            </div>
                          );
                        })}
                      </div>
                    </div>
                  )}

                  <div 
                    ref={chatContainerRef}
                    className="flex-1 p-4 overflow-y-auto space-y-3.5 bg-gray-950/30 flex flex-col"
                  >
                    {fase === 'exterior' ? (
                      <div className="h-full my-auto flex flex-col items-center justify-center text-center p-6 space-y-4">
                        <span className="text-5xl sm:text-6xl animate-bounce">🚪</span>
                        <div className="max-w-md">
                          <h4 className="text-sm sm:text-base font-bold text-white mb-1.5">Aproximación D2D Exterior</h4>
                          <p className="text-xs text-gray-400 leading-relaxed mb-4">
                            Te encuentras ante el hogar del potencial cliente. Inspecciona el entorno y toca el timbre para comenzar.
                          </p>
                          <button
                            onClick={tocarTimbre}
                            className="w-full sm:w-auto px-6 py-3.5 bg-gradient-to-r from-emerald-600 to-teal-600 hover:from-emerald-700 hover:to-teal-700 text-white font-bold rounded-xl text-xs uppercase tracking-wider shadow transform active:scale-95 transition-all min-h-[44px]"
                          >
                            🔔 Tocar Timbre y Presentarse
                          </button>
                        </div>
                      </div>
                    ) : (
                      <div className="space-y-3 flex-1">
                        {historial.map((msg, index) => {
                          if (msg.rol === 'sistema') {
                            return (
                              <div key={index} className="flex justify-center my-1.5">
                                <span className="bg-gray-800 border border-gray-700 text-gray-300 px-3 py-1 rounded-full text-[9px] sm:text-[10px] font-bold uppercase tracking-wider max-w-lg text-center leading-normal">
                                  {msg.texto}
                                </span>
                              </div>
                            );
                          }

                          const esAsesor = msg.rol === 'asesor';
                          return (
                            <div key={index} className={`flex ${esAsesor ? 'justify-end' : 'justify-start'} animate-fadeIn`}>
                              <div className="flex items-start space-x-2 max-w-[90%] sm:max-w-[85%]">
                                {!esAsesor && (
                                  <span className="text-xl sm:text-2xl p-1 bg-gray-800 rounded-lg mt-1 shrink-0">
                                    {cuantitativo ? cliente?.avatar : "👤"}
                                  </span>
                                )}
                                <div className={`p-3 rounded-xl ${esAsesor ? 'bg-blue-600 text-white rounded-tr-none' : 'bg-gray-800 text-gray-100 rounded-tl-none'} shadow-sm`}>
                                  <span className="text-[9px] block font-bold uppercase tracking-widest mb-1 opacity-70">
                                    {esAsesor ? `${nombreAsesor} (Asesor)` : (cuantitativo ? cliente?.nombre : "Propietario")}
                                  </span>
                                  <p className="text-xs leading-relaxed font-medium whitespace-pre-line">{msg.texto}</p>
                                </div>
                              </div>
                            </div>
                          );
                        })}
                      </div>
                    )}

                    {loading && (
                      <div className="flex justify-start items-center space-x-2 animate-pulse mt-3">
                        <span className="text-2xl p-1 bg-gray-800 rounded-lg">{cuantitativo ? cliente?.avatar : "👤"}</span>
                        <div className="bg-gray-800 text-gray-400 text-xs py-2 px-3 rounded-xl rounded-tl-none flex items-center space-x-1.5">
                          <span>Procesando conversación</span>
                          <span className="flex space-x-1">
                            <span className="h-1.5 w-1.5 bg-gray-500 rounded-full animate-bounce"></span>
                            <span className="h-1.5 w-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:0.2s]"></span>
                            <span className="h-1.5 w-1.5 bg-gray-500 rounded-full animate-bounce [animation-delay:0.4s]"></span>
                          </span>
                        </div>
                      </div>
                    )}
                  </div>

                  {/* CONTROLES */}
                  <div className="p-4 bg-gray-900 border-t border-gray-800 shrink-0">
                    {fase === 'conversacion' && (
                      <div className="space-y-3">
                        
                        <div className="bg-gray-950 p-2.5 rounded-xl border border-gray-850 text-[10px] text-gray-400 leading-normal flex items-start space-x-2">
                          <span className="text-lg">📢</span>
                          <p>
                            <span className="font-bold text-white uppercase block mb-0.5">Dinámica conversacional activa</span>
                            Para cerrar o formalizar la portabilidad de forma directa en el acto, solicita de viva voz o escribe la petición de datos (como el DNI o el banco). Para agendar cita formal, propónselo verbalmente en el chat.
                          </p>
                        </div>

                        <form onSubmit={enviarMensajeConversacional} className="flex space-x-2">
                          <div className="relative flex-1">
                            <input
                              type="text"
                              value={inputText}
                              onChange={(e) => setInputText(e.target.value)}
                              placeholder={isListening ? "🎤 Escuchando... hable ahora" : "Ej: 'Para formalizar, ¿me facilita su DNI?' o '¿Agendamos con Clara mañana?'"}
                              className={`w-full bg-gray-950 border rounded-xl pl-4 pr-12 py-3 text-xs focus:outline-none focus:border-blue-500 text-gray-100 placeholder-gray-500 transition-all ${isListening ? 'border-red-500/70 ring-2 ring-red-500/20' : 'border-gray-800'} min-h-[44px]`}
                            />
                            <button
                              type="button"
                              onClick={toggleListening}
                              className={`absolute right-3 top-1/2 -translate-y-1/2 p-2 rounded-lg transition-all duration-200 ${isListening ? 'bg-red-600 text-white animate-pulse' : 'bg-gray-800 text-gray-400'} min-w-[36px] min-h-[36px] flex items-center justify-center`}
                              title="Activar entrada de voz"
                            >
                              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" strokeWidth={1.5} stroke="currentColor" className="w-4 h-4">
                                <path strokeLinecap="round" strokeLinejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
                              </svg>
                            </button>
                          </div>
                          <button
                            type="submit"
                            disabled={!inputText.trim() || loading}
                            className="px-4 sm:px-5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-xs transition-all flex items-center space-x-1 shadow disabled:opacity-50 min-h-[44px]"
                          >
                            <span className="hidden sm:inline">Enviar</span>
                            <span>✈️</span>
                          </button>
                        </form>
                      </div>
                    )}

                    {fase === 'resultado' && (
                      <div className="p-3 sm:p-4 rounded-xl border space-y-4 bg-gray-950 border-gray-800 animate-fadeIn">
                        <div className="flex items-center justify-between border-b border-gray-800 pb-3 gap-2">
                          <div className="flex items-center space-x-3">
                            <span className="text-3xl sm:text-4xl">
                              {resultadoFin === 'win' ? '🏆' : resultadoFin === 'concertada' ? '📅' : resultadoFin === 'retirada' ? '🚶‍♂️' : '🚪'}
                            </span>
                            <div>
                              <h3 className={`text-xs sm:text-base font-black tracking-wide ${resultadoFin === 'win' ? 'text-emerald-400' : resultadoFin === 'concertada' ? 'text-indigo-400' : resultadoFin === 'retirada' ? 'text-yellow-500' : 'text-red-400'}`}>
                                {resultadoFin === 'win' ? '¡VENTA REALIZADA CON ÉXITO!' : resultadoFin === 'concertada' ? '¡CITA CONCERTADA CON ÉXITO!' : resultadoFin === 'retirada' ? 'SESIÓN FINALIZADA POR RETIRADA' : 'FIN DE LA NEGOCIACIÓN: RECHAZO'}
                              </h3>
                              <p className="text-[10px] text-gray-400">Análisis pedagógico de tu comportamiento D2D</p>
                            </div>
                          </div>
                          {informe && (
                            <div className="flex flex-col items-center justify-center bg-gray-900 border border-gray-800 rounded-lg px-2 py-1 text-center shrink-0">
                              <span className="text-[8px] uppercase font-bold text-gray-500 tracking-wider">Nota</span>
                              <span className={`text-base font-black ${informe.global.nota >= 8 ? 'text-green-400' : informe.global.nota >= 5 ? 'text-yellow-500' : 'text-red-500'}`}>
                                {informe.global.nota}/10
                              </span>
                            </div>
                          )}
                        </div>

                        <div className="bg-gray-900/80 p-3 rounded-xl border border-gray-800">
                          <p className="text-[11px] text-gray-300 leading-relaxed whitespace-pre-line font-medium">
                            {feedbackPedagogico}
                          </p>
                        </div>

                        <div className="bg-gray-900/60 p-4 rounded-xl border border-gray-800 space-y-3">
                          <h4 className="text-xs font-bold text-gray-200 uppercase tracking-wider">
                            <span>📧 ACCIONES DE REPORTE Y AUDITORÍA</span>
                          </h4>
                          <p className="text-[10px] text-gray-400">Descarga tu informe oficial en PDF o envíalo por correo electrónico para validación de formación de forma directa.</p>
                          
                          <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                            <button
                              onClick={descargarPDF}
                              disabled={informeLoading}
                              className="px-4 py-2.5 bg-gray-800 hover:bg-gray-700 text-white font-bold rounded-lg text-xs transition-all flex items-center justify-center space-x-2 disabled:opacity-50 min-h-[44px]"
                            >
                              <span>📥 Descargar Informe PDF</span>
                            </button>

                            <button
                              onClick={enviarPorEmailAWalter}
                              disabled={enviandoEmail || informeLoading}
                              className="px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg text-xs transition-all flex items-center justify-center space-x-2 disabled:opacity-50 min-h-[44px]"
                            >
                              {enviandoEmail ? <span className="animate-pulse">Enviando...</span> : <span>📧 Enviar a walter.santos@digimobil.es</span>}
                            </button>
                          </div>

                          {envioLogs.length > 0 && (
                            <div className="bg-gray-950 p-2.5 rounded-lg border border-gray-800 space-y-1 font-mono text-[9px] text-emerald-400">
                              {envioLogs.map((log, lIdx) => (
                                <div key={lIdx} className="flex items-center gap-1.5">
                                  <span className="h-1.5 w-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                                  <span>{log}</span>
                                </div>
                              ))}
                            </div>
                          )}

                          {emailEnviadoConExito && (
                            <div className="bg-emerald-950/40 border border-emerald-500/50 text-emerald-300 p-2.5 rounded-lg text-xs flex items-center gap-2">
                              <span>✅</span>
                              <p className="text-[10px] font-semibold">Auditoría enviada con éxito. Se abrirá tu gestor de correo para despachar el mensaje formalizado.</p>
                            </div>
                          )}
                        </div>

                        {/* DESGLOSE AUDITORÍA */}
                        <div className="mt-4 space-y-3">
                          <h4 className="text-xs font-bold text-blue-400 uppercase tracking-wider flex items-center gap-1.5">
                            <span>📋 INFORME DE RENDIMIENTO</span>
                            {informeLoading && <span className="text-[8px] bg-blue-950 text-blue-400 border border-blue-800 px-2 py-0.5 rounded animate-pulse">Analizando...</span>}
                          </h4>

                          {informeLoading ? (
                            <div className="bg-gray-900/40 p-5 rounded-xl border border-gray-800 space-y-3 flex flex-col items-center justify-center py-8">
                              <div className="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-500"></div>
                              <p className="text-[10px] text-gray-400 font-semibold animate-pulse">Calificando fases de venta...</p>
                            </div>
                          ) : informe ? (
                            <div className="space-y-3">
                              
                              <div className="bg-blue-950/20 border border-blue-900/60 p-3 rounded-xl">
                                <span className="text-[8px] uppercase font-bold text-blue-400 block tracking-wider mb-1">🎯 Consejo Clave</span>
                                <p className="text-[11px] text-blue-200 italic font-medium">"{informe.global.consejo_clave}"</p>
                              </div>

                              <div className="grid grid-cols-1 md:grid-cols-2 gap-3 max-h-60 overflow-y-auto">
                                {informe.fases.map((f, idx) => (
                                  <div key={idx} className="bg-gray-900/70 p-3 rounded-xl border border-gray-800 flex flex-col justify-between">
                                    <div>
                                      <h5 className="text-[10px] font-black text-white border-b border-gray-800 pb-1 mb-1">{f.nombre}</h5>
                                      <p className="text-[10px] text-gray-400 leading-relaxed mb-2">{f.evaluacion}</p>
                                    </div>
                                    
                                    <div className="space-y-1.5 border-t border-gray-800 pt-1.5">
                                      {f.aciertos?.map((ac, aIdx) => (
                                        <div key={aIdx} className="text-[10px] text-green-400 flex items-start gap-1 font-medium">
                                          <span>✅</span><span>{ac}</span>
                                        </div>
                                      ))}
                                      {f.fallos?.map((fa, fIdx) => (
                                        <div key={fIdx} className="text-[10px] text-red-400 flex items-start gap-1 font-medium">
                                          <span>❌</span><span>{fa}</span>
                                        </div>
                                      ))}
                                    </div>
                                  </div>
                                ))}
                              </div>

                            </div>
                          ) : (
                            <p className="text-[11px] text-gray-500 italic">Auditoría no disponible.</p>
                          )}
                        </div>

                        <button
                          onClick={reiniciarPartida}
                          className="w-full py-3 bg-gradient-to-r from-blue-600 to-indigo-600 text-white font-bold rounded-xl text-xs shadow hover:from-blue-700 hover:to-indigo-700 transition-all min-h-[44px]"
                        >
                          🔄 Entrenar con otro cliente (Aleatorio)
                        </button>
                      </div>
                    )}

                    {fase === 'conversacion' && (
                      <div className="mt-2.5 flex justify-between items-center text-[9px] sm:text-[10px] text-gray-500 bg-gray-950/20 p-2 rounded-lg border border-gray-800 gap-2">
                        <span className="flex items-center space-x-1">
                          <span>🔒</span>
                          <span className="font-semibold text-gray-400">Modo de evaluación:</span>
                          <span className="line-clamp-1">Negociación activa sin asistencia. Las pistas de reenganche han sido desactivadas para máxima fidelidad comercial.</span>
                        </span>
                        <span className="text-gray-400 font-bold shrink-0">Defensiva: {defensiva}%</span>
                      </div>
                    )}
                  </div>

                </section>
              </>
            )}

          </main>

          <footer className="bg-gray-950 py-3 border-t border-gray-900 text-center text-[9px] sm:text-[10px] text-gray-500 shrink-0">
            Simulador de Formación Comercial D2D España v5.0
          </footer>

        </div>
      );
    }

    // Renderizar la App principal en el root del HTML
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrenador D2D</title>
  <!-- Enlace al manifiesto de instalación -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#090d16">
  <!-- Soporte para instalación en iOS (Safari) -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

  <div id="root"></div>

  <!-- Registro del Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
          .then(reg => console.log('Service Worker registrado con éxito:', reg.scope))
          .catch(err => console.warn('Fallo al registrar el Service Worker:', err));
      });
    }
  </script>
</body>
</html>

</body>
</html>
